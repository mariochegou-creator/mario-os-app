<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mário OS</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#121212" />
<style>
  :root {
    --bg: #121212;
    --card: #1c1c1c;
    --accent: #4ade80;
    --text: #eaeaea;
    --muted: #8a8a8a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }
  .logo {
    font-size: 28px;
    font-weight: 700;
    margin: 12px 0 4px;
    letter-spacing: 0.5px;
  }
  .logo span { color: var(--accent); }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 24px;
    text-align: center;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: var(--card);
    border-radius: 16px;
    padding: 18px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  textarea {
    width: 100%;
    min-height: 130px;
    background: #0e0e0e;
    color: var(--text);
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    resize: vertical;
    font-family: inherit;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
  button {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-primary {
    background: var(--accent);
    color: #0e0e0e;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.5; }
  .chips { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .chip {
    background: #262626;
    color: var(--text);
    border: 1px solid #333;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .status {
    margin-top: 16px;
    font-size: 14px;
    min-height: 20px;
    color: var(--muted);
  }
  .status.ok { color: var(--accent); }
  .status.err { color: #f87171; }
</style>
</head>
<body>
  <div class="logo">Mário <span>OS</span></div>
  <div class="subtitle">Manda pro cérebro. Ele resolve.</div>

  <div class="card">
    <textarea id="texto" placeholder="Cola um link, escreve uma ideia, ou compartilha um vídeo direto pra cá..."></textarea>

    <div class="chips">
      <div class="chip" data-tpl="Modelar esse vídeo: ">Modelar vídeo</div>
      <div class="chip" data-tpl="Ideia pro canal: ">Ideia canal</div>
      <div class="chip" data-tpl="Cliente novo: ">Cliente Nexo</div>
    </div>

    <div class="row">
      <button class="btn-primary" id="enviar">Enviar pro Cérebro 🚀</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    // ====== CONFIG ======
    const BOT_TOKEN = "8957008079:AAFjQj-eximltq251kqZvqYZacTCDhHDIoc";
    const CHAT_ID = "8212897284";
    // =====================

    const params = new URLSearchParams(window.location.search);
    const sharedTitle = params.get("title") || "";
    const sharedText = params.get("text") || "";
    const sharedUrl = params.get("url") || "";

    const textarea = document.getElementById("texto");
    const statusEl = document.getElementById("status");
    const btn = document.getElementById("enviar");

    // Junta o que veio do compartilhamento (Android manda tudo isso quando
    // vc compartilha um video do YouTube/Instagram/Reels)
    const partes = [sharedTitle, sharedText, sharedUrl].filter(Boolean);
    if (partes.length) {
      textarea.value = partes.join("\n");
    }

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        textarea.value = chip.dataset.tpl + textarea.value;
        textarea.focus();
      });
    });

    async function enviar() {
      const texto = textarea.value.trim();
      if (!texto) {
        statusEl.textContent = "Escreve ou cola algo antes de enviar.";
        statusEl.className = "status err";
        return;
      }
      btn.disabled = true;
      statusEl.textContent = "Enviando pro cérebro...";
      statusEl.className = "status";

      try {
        const resp = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ chat_id: CHAT_ID, text: texto }),
        });
        const data = await resp.json();
        if (data.ok) {
          statusEl.textContent = "✅ Enviado! O Claude já está processando — confere o Telegram em alguns segundos.";
          statusEl.className = "status ok";
          textarea.value = "";
        } else {
          throw new Error(data.description || "Erro desconhecido");
        }
      } catch (e) {
        statusEl.textContent = "❌ Não consegui enviar: " + e.message;
        statusEl.className = "status err";
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", enviar);
  </script>
</body>
</html>
